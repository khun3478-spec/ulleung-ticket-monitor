name: Ulleung Ticket Monitor

on:
  workflow_dispatch:

  push:

  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: read

jobs:
  monitor:

    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore State Cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: ulleung-state-v1
          restore-keys: |
            ulleung-state-v1

      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py

      - name: Save State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: ulleung-state-v1-${{ github.run_id }}
